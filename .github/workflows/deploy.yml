name: Deploy to Replit

on:
  push:
    branches:
      - main

concurrency:
  group: replit-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Trigger Replit Deployment
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Trigger deployment
        id: trigger
        run: |
          echo "Triggering Replit deployment for repl ${{ vars.REPLIT_REPL_ID }}..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.replit.com/v1/repls/${{ vars.REPLIT_REPL_ID }}/deployments" \
            -H "Authorization: Bearer ${{ secrets.REPLIT_API_TOKEN }}" \
            -H "Content-Type: application/json")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          echo "HTTP status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            DEPLOYMENT_ID=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null || echo "")
            if [ -z "$DEPLOYMENT_ID" ]; then
              echo "ERROR: Deployment triggered (HTTP $HTTP_CODE) but no deployment ID in response. Cannot track status."
              echo "Response body: $BODY"
              exit 1
            fi
            echo "deployment_id=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT
            echo "Deployment triggered successfully (id=$DEPLOYMENT_ID)"
          else
            echo "Failed to trigger deployment (HTTP $HTTP_CODE): $BODY"
            exit 1
          fi

      - name: Poll deployment status
        id: poll
        run: |
          DEPLOYMENT_ID="${{ steps.trigger.outputs.deployment_id }}"
          echo "Polling status for deployment $DEPLOYMENT_ID..."
          for i in $(seq 1 30); do
            sleep 10
            RESPONSE=$(curl -s -w "\n%{http_code}" \
              "https://api.replit.com/v1/deployments/$DEPLOYMENT_ID" \
              -H "Authorization: Bearer ${{ secrets.REPLIT_API_TOKEN }}")
            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            BODY=$(echo "$RESPONSE" | head -n-1)
            if [ "$HTTP_CODE" -ne 200 ]; then
              echo "Could not fetch status (HTTP $HTTP_CODE), retrying..."
              continue
            fi
            STATE=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('state','unknown'))" 2>/dev/null || echo "unknown")
            echo "[$i/30] Deployment state: $STATE"
            if [ "$STATE" = "SUCCEEDED" ] || [ "$STATE" = "success" ]; then
              echo "Deployment succeeded!"
              exit 0
            elif [ "$STATE" = "FAILED" ] || [ "$STATE" = "failed" ] || [ "$STATE" = "ERROR" ]; then
              echo "Deployment failed with state: $STATE"
              exit 1
            fi
          done
          echo "Deployment polling timed out after 5 minutes. Check Replit dashboard for status."
          exit 1

      - name: Notify Telegram
        if: always()
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          REPORT_CHAT_ID: ${{ secrets.REPORT_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$REPORT_CHAT_ID" ]; then
            echo "TELEGRAM_BOT_TOKEN or REPORT_CHAT_ID not set — skipping Telegram notification"
            exit 0
          fi

          JOB_STATUS="${{ job.status }}"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "$JOB_STATUS" = "success" ]; then
            ICON="✅"
            STATUS_TEXT="Деплой успешен"
          else
            ICON="❌"
            STATUS_TEXT="Деплой завершился с ошибкой"
          fi

          MESSAGE="${ICON} *${STATUS_TEXT}*
Коммит: \`${SHORT_SHA}\`
[Смотреть в GitHub Actions](${RUN_URL})"

          TGRESPONSE=$(curl -sSf -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${REPORT_CHAT_ID}\",
              \"text\": $(echo "$MESSAGE" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))'),
              \"parse_mode\": \"Markdown\",
              \"disable_web_page_preview\": true
            }")
          TG_OK=$(echo "$TGRESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('ok','false'))" 2>/dev/null || echo "false")
          if [ "$TG_OK" != "True" ] && [ "$TG_OK" != "true" ]; then
            echo "WARNING: Telegram API returned ok=false. Response: $TGRESPONSE"
            exit 1
          fi
          echo "Telegram notification sent successfully"
